<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeeptha Madan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@200&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: #E5E5E5; 
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            color: #D4AF37; 
        }
        .btn-luxury {
            border: 0.5px solid #D4AF37;
            color: #D4AF37;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            display: inline-block;
        }
        .btn-luxury:hover {
            background-color: #D4AF37;
            color: #121212;
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body>

    <div class="text-center">
        <h1 class="text-6xl font-light mb-16 tracking-tight">Sandeeptha Madan</h1>

        <div class="mb-4 flex flex-col items-center gap-4">
            <button onclick="window.open('resume_general.pdf', '_blank');" class="btn-luxury px-16 py-5 text-[10px] uppercase tracking-[0.4em] font-light">
                View Resume — General
            </button>
            <button onclick="window.open('resume_embedded.pdf', '_blank');" class="btn-luxury px-16 py-5 text-[10px] uppercase tracking-[0.4em] font-light">
                View Resume — Embedded Systems
            </button>
            <button onclick="window.open('resume_frontend.pdf', '_blank');" class="btn-luxury px-16 py-5 text-[10px] uppercase tracking-[0.4em] font-light">
                View Resume — Frontend
            </button>
        </div>

        <footer class="flex justify-center gap-12 text-[10px] uppercase tracking-[0.5em] text-gray-500 mt-20">
            <a href="https://github.com/Sandeeptha-NotAbot" target="_blank" class="hover:text-white transition-colors">GitHub</a>
            <a href="https://www.linkedin.com/in/sandeeptha-madan/" target="_blank" class="hover:text-white transition-colors">LinkedIn</a>
        </footer>
    </div>

</body>
</html>
