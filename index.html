<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeeptha Madan | Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #F9F8F6; /* Luxury Off-White */
            font-family: 'Inter', sans-serif;
        }
        .resume-container {
            box-shadow: 0 10px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 md:p-10">

    <div class="mb-8 text-center">
        <h1 class="text-xs uppercase tracking-[0.5em] text-gray-400 font-light">Sandeeptha Madan</h1>
    </div>

    <div class="resume-container w-full max-w-5xl bg-white rounded-sm overflow-hidden" style="height: 85vh;">
        <iframe 
            src="resume.pdf#toolbar=0&navpanes=0&scrollbar=0" 
            class="w-full h-full border-none"
            title="Sandeeptha Madan Resume">
        </iframe>
    </div>

    <footer class="mt-8 flex gap-10">
        <a href="resume.pdf" download class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">
            Download PDF
        </a>
        <a href="https://github.com/Sandeeptha-NotAbot" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition-all">
            GitHub
        </a>
    </footer>

</body>
</html>
